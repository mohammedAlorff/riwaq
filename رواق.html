<script type="text/babel" data-presets="react">
/* Shared components — public student portal (read-only) */

function arabicDigits(str) {
  const map = { "0":"٠","1":"١","2":"٢","3":"٣","4":"٤","5":"٥","6":"٦","7":"٧","8":"٨","9":"٩" };
  return String(str).replace(/[0-9]/g, d => map[d]);
}

function relativeTimeAr(input) {
  if (!input) return "";
  let ts;
  if (typeof input === "number") {
    ts = input;
  } else if (typeof input === "string") {
    const iso = input.includes("T") ? input : input.replace(" ", "T");
    const d = new Date(iso);
    ts = d.getTime();
  } else {
    return "";
  }
  if (!isFinite(ts)) return "";

  const diff = Math.max(0, Date.now() - ts);
  const min  = Math.floor(diff / 60000);
  const hour = Math.floor(min / 60);
  const day  = Math.floor(hour / 24);
  if (min < 1)   return "الآن";
  if (min === 1) return "قبل دقيقة";
  if (min === 2) return "قبل دقيقتين";
  if (min < 11)  return `قبل ${arabicDigits(min)} دقائق`;
  if (min < 60)  return `قبل ${arabicDigits(min)} دقيقة`;
  if (hour === 1) return "قبل ساعة";
  if (hour === 2) return "قبل ساعتين";
  if (hour < 11)  return `قبل ${arabicDigits(hour)} ساعات`;
  if (hour < 24)  return `قبل ${arabicDigits(hour)} ساعة`;
  if (day === 1) return "أمس";
  if (day === 2) return "قبل يومين";
  if (day < 11)  return `قبل ${arabicDigits(day)} أيام`;
  if (day < 30)  return `قبل ${arabicDigits(day)} يوماً`;
  const month = Math.floor(day / 30);
  if (month === 1) return "قبل شهر";
  if (month < 12)  return `قبل ${arabicDigits(month)} أشهر`;
  return `قبل ${arabicDigits(Math.floor(month / 12))} سنة`;
}

function Avatar({ size = "md", color, children, image, alt, style = {} }) {
  if (image) {
    return (
      <div className={`avatar ${size} avatar-image`} style={style}>
        <img src={image} alt={alt || ""} loading="lazy"/>
      </div>
    );
  }
  return (
    <div className={`avatar ${size}`} style={{ background: color || "#3a5a40", ...style }}>
      {children}
    </div>
  );
}

const Icon = ({ name, size = 20, stroke = 1.7 }) => {
  const props = {
    width: size, height: size, viewBox: "0 0 24 24",
    fill: "none", stroke: "currentColor", strokeWidth: stroke,
    strokeLinecap: "round", strokeLinejoin: "round",
    "aria-hidden": "true", focusable: "false"
  };
  switch (name) {
    case "home":     return <svg {...props}><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>;
    case "compass":  return <svg {...props}><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2 5.5-5.5 2 2-5.5 5.5-2z"/></svg>;
    case "calendar": return <svg {...props}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>;
    case "search":   return <svg {...props}><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>;
    case "users":    return <svg {...props}><circle cx="9" cy="8" r="3.5"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><circle cx="17" cy="9" r="2.5"/><path d="M21 19c0-2.5-1.5-3.5-4-3.5"/></svg>;
    case "pin":      return <svg {...props}><path d="M12 21s-6-6-6-11a6 6 0 1 1 12 0c0 5-6 11-6 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>;
    case "clock":    return <svg {...props}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case "check":    return <svg {...props}><path d="m5 12 5 5L20 7"/></svg>;
    case "x":        return <svg {...props}><path d="M6 6 18 18M18 6 6 18"/></svg>;
    case "arrow-right": return <svg {...props}><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>;
    case "image":    return <svg {...props}><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="m4 19 6-6 5 5 3-3 2 2"/></svg>;
    case "external": return <svg {...props}><path d="M14 4h6v6"/><path d="M20 4 10 14"/><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"/></svg>;
    case "twitter":  return <svg {...props} fill="currentColor" stroke="none">
        <path d="M18.244 2H21l-6.49 7.41L22.5 22h-6.83l-5.36-7-6.13 7H1.5l6.94-7.94L1.5 2h6.99l4.84 6.4L18.244 2Zm-2.39 18h1.88L8.27 4h-2L15.854 20Z"/>
      </svg>;
    case "instagram": return <svg {...props}>
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor"/>
      </svg>;
    case "snapchat": return <svg {...props}>
        <path d="M12 3c-3 0-5 2-5 5v2c0 1-1 2-2 2.5l-1 .5c-.5.2-.5.7 0 1l1.5.7c.8.3 1.2.9 1.4 1.6.2.7.7.9 1.3.6.6-.3 1.4 0 1.9.6.6.7 1.7 1.5 3 1.5s2.4-.8 3-1.5c.5-.6 1.3-.9 1.9-.6.6.3 1.1.1 1.3-.6.2-.7.6-1.3 1.4-1.6l1.5-.7c.5-.3.5-.8 0-1l-1-.5c-1-.5-2-1.5-2-2.5V8c0-3-2-5-5-5Z"/>
      </svg>;
    case "tiktok": return <svg {...props}>
        <path d="M14 3v10.5a3.5 3.5 0 1 1-3.5-3.5"/>
        <path d="M14 3c.5 2.5 2.5 4 5 4.2"/>
      </svg>;
    case "telegram": return <svg {...props}>
        <path d="M22 3 2 11l6 2 2 7 4-4 6 4 2-17Z"/>
        <path d="m8 13 10-6-8 8"/>
      </svg>;
    default: return null;
  }
};

function Sidebar({ route, setRoute }) {
  const navItems = [
    { id: "feed",   label: "الرئيسية",  icon: "home" },
    { id: "clubs",  label: "الأندية",   icon: "compass" },
    { id: "events", label: "الفعاليات", icon: "calendar" }
  ];
  return (
    <aside className="sidebar" aria-label="القائمة الجانبية">
      <div className="brand">
        <div className="brand-mark" aria-hidden="true">ر</div>
        <div>
          <div className="brand-name">رواق</div>
          <div className="brand-sub">جامعة الإمام محمد بن سعود</div>
        </div>
      </div>
      <nav className="nav" aria-label="التنقل الرئيسي">
        {navItems.map(n => (
          <button
            key={n.id} type="button"
            className={`nav-item ${route === n.id ? "active" : ""}`}
            onClick={() => setRoute(n.id)}
            aria-current={route === n.id ? "page" : undefined}
            aria-label={n.label}
          >
            <span className="nav-icon"><Icon name={n.icon} size={20}/></span>
            <span className="nav-label">{n.label}</span>
          </button>
        ))}
      </nav>
      <div className="sidebar-foot">
        <div className="sidebar-foot-note">
          بوابة استعراض رسمية لأندية جامعة الإمام محمد بن سعود الإسلامية.
          للانضمام لنادٍ، تواصل مع إدارة الأنشطة الطلابية.
        </div>
      </div>
    </aside>
  );
}

function MainHead({ title, sub, search, children }) {
  return (
    <div className="main-head">
      <div className="main-head-titles">
        <h1>{title}</h1>
        {sub ? <div className="sub">{sub}</div> : null}
      </div>
      {search ? (
        <label className="search" aria-label="البحث في رواق">
          <Icon name="search" size={16}/>
          <input
            type="search"
            placeholder={search.placeholder || "ابحث في رواق…"}
            value={search.value}
            onChange={e => search.onChange(e.target.value)}
          />
        </label>
      ) : null}
      {children}
    </div>
  );
}

function PostCard({ post, club }) {
  if (!club) return null;
  const typeLabel = { announcement: "إعلان", event: "فعالية", post: "منشور" }[post.type] || "منشور";
  const timeText  = relativeTimeAr(post.createdAt || post._createdAt) || post.time || "";
  const imageSrc  = post.image && post.image.startsWith("http")
    ? post.image
    : (post.image ? "uploads/" + post.image.replace(/^uploads\//, "") : null);

  return (
    <article className="post">
      <div className="post-head">
        <Avatar size="md" color={club.color} image={club.image} alt={club.name}>{club.icon}</Avatar>
        <div className="post-author">
          <div className="post-author-name">
            {club.name}
            <span className="verified" title="نادي معتمد" aria-label="نادي معتمد">
              <Icon name="check" size={9} stroke={3}/>
            </span>
          </div>
          <div className="post-meta">
            <span>{club.college}</span>
            <span className="dot" aria-hidden="true"></span>
            <span>{timeText}</span>
          </div>
        </div>
        <span className={`post-type-pill ${post.type}`}>{typeLabel}</span>
      </div>

      <div className="post-body">
        <div className="post-title">{post.title}</div>
        <div className="post-text">{post.body}</div>
        {post.tags && post.tags.length > 0 && (
          <div className="post-tags">
            {post.tags.map(t => <span key={t} className="post-tag">{t}</span>)}
          </div>
        )}
        {post.externalUrl && (
          <a className="post-external" href={post.externalUrl}
             target="_blank" rel="noopener noreferrer nofollow">
            <Icon name="external" size={14}/>
            <span>{post.type === "event" ? "سجِّل في الفعالية" : "افتح الرابط"}</span>
          </a>
        )}
      </div>

      {imageSrc && (
        <div className="post-image">
          <img src={imageSrc} alt={post.title || "صورة المنشور"} loading="lazy"/>
        </div>
      )}
      {!imageSrc && post.image && (
        <div className="post-image" role="img" aria-label="صورة المنشور">
          <div className="post-image-bg" aria-hidden="true"></div>
          <div className="post-image-icon" aria-hidden="true">
            <Icon name="image" size={36} stroke={1.3}/>
          </div>
        </div>
      )}
    </article>
  );
}

function FeedRail({ onOpenClub, onOpenEvents, onSelectTag }) {
  const { clubs, events, trendingTags } = React.useContext(window.RiwaqData);
  const monthNames = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

  return (
    <aside className="rail" aria-label="معلومات جانبية">
      <div className="rail-card">
        <div className="rail-title">
          <span>فعاليات قادمة</span>
          <button type="button" className="see-all" onClick={onOpenEvents}>عرض الكل</button>
        </div>
        {events.length === 0 && (
          <div className="rail-empty">لا فعاليات قادمة</div>
        )}
        {events.slice(0, 4).map(e => {
          const parts = (e.date || "").split("-");
          const day = parts[2] ? arabicDigits(parts[2]) : "";
          const monthIdx = parts[1] ? parseInt(parts[1], 10) - 1 : -1;
          const month = monthIdx >= 0 && monthNames[monthIdx] ? monthNames[monthIdx] : (parts[1] ? arabicDigits(parts[1]) : "");
          const time = (e.time || "").slice(0, 5);
          return (
            <button key={e.id} type="button" className="event-row"
                    onClick={onOpenEvents}
                    aria-label={`فعالية: ${e.title}`}>
              <div className="event-date" aria-hidden="true">
                <div className="d">{day}</div>
                <div className="m">{month}</div>
              </div>
              <div className="event-info">
                <div className="event-name">{e.title}</div>
                <div className="event-loc">{e.location} · {arabicDigits(time)}</div>
              </div>
            </button>
          );
        })}
      </div>

      <div className="rail-card">
        <div className="rail-title">
          <span>أندية الجامعة</span>
          <button type="button" className="see-all" onClick={() => onOpenClub(null)}>عرض الكل</button>
        </div>
        {clubs.slice(0, 4).map(c => (
          <button key={c.id} type="button" className="club-row"
                  onClick={() => onOpenClub(c.id)}
                  aria-label={`فتح ${c.name}`}>
            {c.image ? (
              <div className="club-icon club-icon-image" aria-hidden="true">
                <img src={c.image} alt="" loading="lazy"/>
              </div>
            ) : (
              <div className="club-icon" style={{ background: c.color }} aria-hidden="true">{c.icon}</div>
            )}
            <div className="club-info">
              <div className="club-name">{c.name}</div>
              <div className="club-members">{arabicDigits(c.members)} عضو · {c.college}</div>
            </div>
          </button>
        ))}
      </div>

      {trendingTags && trendingTags.length > 0 && (
        <div className="rail-card">
          <div className="rail-title"><span>الأكثر تداولاً</span></div>
          <div className="tag-chips">
            {trendingTags.map(t => (
              <button key={t} type="button" className="tag-chip"
                      onClick={() => onSelectTag && onSelectTag(t)}
                      aria-label={`تصفية ب${t}`}>
                {t}
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="rail-foot">
        © رواق ١٤٤٧هـ · بوابة طلابية لجامعة الإمام محمد بن سعود الإسلامية.
        <br/>
        نسخة تجريبية · بُنيت لطلبة الجامعة.
      </div>
    </aside>
  );
}

function SocialLinks({ socials }) {
  if (!socials || Object.keys(socials).length === 0) return null;
  const meta = {
    twitter:   { label: "تويتر / X",  icon: "twitter",   color: "#000000" },
    instagram: { label: "إنستقرام",   icon: "instagram", color: "#c2185b" },
    snapchat:  { label: "سناب شات",   icon: "snapchat",  color: "#fbbf24" },
    tiktok:    { label: "تيك توك",    icon: "tiktok",    color: "#1a1a1a" },
    telegram:  { label: "تيليجرام",   icon: "telegram",  color: "#2aabee" }
  };
  const entries = Object.entries(socials).filter(([k, v]) => meta[k] && v && (v.url || v.handle));
  if (entries.length === 0) return null;
  return (
    <div className="socials">
      {entries.map(([key, val]) => {
        const m = meta[key];
        return (
          <a key={key} className="social-card" href={val.url || "#"}
             target="_blank" rel="noopener noreferrer nofollow"
             aria-label={`${m.label}: ${val.handle || val.url}`}>
            <div className="social-ico" style={{ background: m.color }} aria-hidden="true">
              <Icon name={m.icon} size={16}/>
            </div>
            <div className="social-text">
              <div className="social-label">{m.label}</div>
              <div className="social-handle">{val.handle || val.url}</div>
            </div>
            <span className="social-arrow" aria-hidden="true"><Icon name="external" size={14}/></span>
          </a>
        );
      })}
    </div>
  );
}

Object.assign(window, {
  Avatar, Icon, Sidebar, MainHead, PostCard, FeedRail, SocialLinks,
  arabicDigits, relativeTimeAr
});
</script>

<script type="text/babel" data-presets="react">
function FeedScreen({ state, dispatch }) {
  const { clubs, posts } = React.useContext(window.RiwaqData);
  const clubMap = React.useMemo(
    () => Object.fromEntries(clubs.map(c => [c.id, c])),
    [clubs]
  );
  const [tab, setTab]     = React.useState("all");
  const [query, setQuery] = React.useState("");
  const q = query.trim().toLowerCase();
  const tagFilter = state.feedTag || null;

  const filtered = React.useMemo(() => posts.filter(p => {
    if (!clubMap[p.clubId]) return false;
    if (tab === "events"        && p.type !== "event")        return false;
    if (tab === "announcements" && p.type !== "announcement") return false;
    if (tab === "posts"         && p.type !== "post")         return false;
    if (tagFilter && !(p.tags && p.tags.includes(tagFilter))) return false;
    if (q) {
      const haystack = (
        (p.title || "") + " " + (p.body  || "") + " " +
        ((p.tags || []).join(" ")) + " " +
        (clubMap[p.clubId].name || "")
      ).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  }), [posts, clubMap, tab, tagFilter, q]);

  return (
    <>
      <MainHead
        title="الرئيسية"
        sub={`أحدث ما يدور في أندية وفعاليات جامعة الإمام · ${arabicDigits(filtered.length)} منشور`}
        search={{ value: query, onChange: setQuery }}>
        <div className="tabs" role="tablist" aria-label="تصفية حسب النوع">
          {[
            { id: "all", label: "الكل" },
            { id: "announcements", label: "إعلانات" },
            { id: "events", label: "فعاليات" },
            { id: "posts", label: "منشورات" }
          ].map(t => (
            <button key={t.id} type="button" role="tab"
                    aria-selected={tab === t.id}
                    className={`tab ${tab === t.id ? "active" : ""}`}
                    onClick={() => setTab(t.id)}>{t.label}</button>
          ))}
        </div>
      </MainHead>

      <div className="main-body">
        {tagFilter && (
          <div className="filter-bar" role="status">
            <span className="filter-bar-label">عرض المنشورات الموسومة بـ</span>
            <span className="filter-bar-tag">{tagFilter}</span>
            <button type="button" className="filter-bar-clear"
                    onClick={() => dispatch({ type: "clearFeedTag" })}
                    aria-label="إزالة الفلتر">
              <Icon name="x" size={14}/><span>إلغاء</span>
            </button>
          </div>
        )}

        {filtered.length === 0 ? (
          <div className="empty">
            <Icon name="compass" size={48} stroke={1.2}/>
            <div className="title">
              {q || tagFilter ? "لا منشورات تطابق البحث" : "لا منشورات هنا بعد"}
            </div>
            <div className="sub">
              {q || tagFilter
                ? "جرّب كلمة أخرى أو ألغِ الفلاتر"
                : "ستظهر هنا أحدث إعلانات وفعاليات أندية الجامعة فور نشرها"}
            </div>
          </div>
        ) : (
          filtered.map(p => <PostCard key={p.id} post={p} club={clubMap[p.clubId]}/>)
        )}
      </div>
    </>
  );
}

function ClubsScreen({ state, dispatch }) {
  const { clubs } = React.useContext(window.RiwaqData);
  const [cat, setCat] = React.useState("الكل");
  const [q, setQ]     = React.useState("");
  const cats = ["الكل", "تقني", "ثقافي", "شرعي", "أكاديمي", "رياضي", "إبداعي"];
  const query = q.trim().toLowerCase();
  const filtered = clubs.filter(c =>
    (cat === "الكل" || c.cat === cat) &&
    (query === "" ||
      c.name.toLowerCase().includes(query) ||
      (c.desc || "").toLowerCase().includes(query) ||
      (c.college || "").toLowerCase().includes(query))
  );

  return (
    <>
      <MainHead title="الأندية" sub={`اكتشف ${arabicDigits(clubs.length)} نادياً طلابياً في الجامعة`}/>
      <div className="main-body">
        <div className="clubs-filters">
          <div role="tablist" aria-label="تصفية حسب التصنيف" className="clubs-filter-tabs">
            {cats.map(c => (
              <button key={c} type="button" role="tab"
                      aria-selected={cat === c}
                      className={`tab ${cat === c ? "active" : ""}`}
                      onClick={() => setCat(c)}>{c}</button>
            ))}
          </div>
          <label className="search clubs-search" aria-label="ابحث عن نادٍ">
            <Icon name="search" size={16}/>
            <input type="search" placeholder="ابحث عن نادٍ…"
                   value={q} onChange={e => setQ(e.target.value)}/>
          </label>
        </div>

        <div className="club-grid">
          {filtered.map(c => (
            <button key={c.id} type="button" className="club-card"
                    onClick={() => dispatch({ type: "openClub", id: c.id })}
                    aria-label={`فتح ${c.name}`}>
              <div className="club-cover" style={{ background: c.cover }}>
                <div className="club-cover-pattern" aria-hidden="true"></div>
                {c.image ? (
                  <div className="club-card-icon club-card-icon-image" aria-hidden="true">
                    <img src={c.image} alt="" loading="lazy"/>
                  </div>
                ) : (
                  <div className="club-card-icon" style={{ background: c.color }} aria-hidden="true">{c.icon}</div>
                )}
              </div>
              <div className="club-card-body">
                <span className="club-card-cat">{c.cat}</span>
                <div className="club-card-name">{c.name}</div>
                <div className="club-card-desc">{c.desc}</div>
                <div className="club-card-foot">
                  <div className="club-card-members">
                    <Icon name="users" size={14}/>
                    {arabicDigits(c.members)} عضو
                  </div>
                  <div className="club-card-college">{c.college}</div>
                </div>
              </div>
            </button>
          ))}

        {filtered.length === 0 && (
          <div className="empty">
            <Icon name="search" size={42} stroke={1.2}/>

            <div className="sub">جرّب تصنيفًا أو كلمةً أخرى</div>
          </div>
        )}
      </div>
    </>
  );
}

function ClubDetail({ clubId, state, dispatch, onBack }) {
  const { clubs, posts, events } = React.useContext(window.RiwaqData);
  const club = clubs.find(c => c.id === clubId);
  const [tab, setTab] = React.useState("posts");
  const clubMap = React.useMemo(
    () => Object.fromEntries(clubs.map(c => [c.id, c])),
    [clubs]
  );

  if (!club) {
    return (
      <div className="empty">
        <Icon name="search" size={42} stroke={1.2}/>
        <div className="title">لم نتمكن من العثور على هذا النادي</div>
        <div className="sub">قد يكون قد حُذف أو غُيّر معرّفه</div>
        <button type="button" className="btn btn-ghost" style={{ marginTop: 14 }} onClick={onBack}>
          العودة إلى الأندية
        </button>
      </div>
    );
  }

  const clubPosts  = posts.filter(p => p.clubId === clubId);
  const clubEvents = events.filter(e => e.clubId === clubId);
  const hasSocials = club.socials && Object.keys(club.socials).length > 0;

  return (
    <>
      <div className="main-head cd-main-head">
        <button type="button" className="icon-btn" onClick={onBack}
                title="رجوع إلى الأندية" aria-label="رجوع إلى الأندية">
          <Icon name="arrow-right" size={18}/>
        </button>
        <div>
          <h1>{club.name}</h1>
          <div className="sub">{club.college} · {club.cat}</div>
        </div>
      </div>

      <div className="cd-cover" style={{ background: club.cover }} aria-hidden="true">
        <div className="cd-cover-pattern"></div>
      </div>
      <div className="cd-head">
        {club.image ? (
          <div className="cd-icon cd-icon-image" aria-hidden="true">
            <img src={club.image} alt="" loading="lazy"/>
          </div>
        ) : (
          <div className="cd-icon" style={{ background: club.color }} aria-hidden="true">{club.icon}</div>
        )}
        <div className="cd-name-block">
          <div className="cd-name">{club.name}</div>
          <div className="cd-meta">
            <span>{club.college}</span>
            <span aria-hidden="true">·</span>
            <span>{arabicDigits(club.members)} عضو</span>
          </div>
        </div>
      </div>

      <div className="cd-desc">{club.desc}</div>

      <div className="stats-row">
        <div className="stat-cell">
          <div className="stat-v">{arabicDigits(club.members)}</div>
          <div className="stat-l">عضو نشط</div>
        </div>
        <div className="stat-cell">
          <div className="stat-v">{arabicDigits(clubPosts.length)}</div>
          <div className="stat-l">منشور</div>
        </div>
        <div className="stat-cell">
          <div className="stat-v">{arabicDigits(clubEvents.length)}</div>
          <div className="stat-l">فعالية</div>
        </div>
        <div className="stat-cell">
          <div className="stat-v">{hasSocials ? arabicDigits(Object.keys(club.socials).length) : "—"}</div>
          <div className="stat-l">حساب رسمي</div>
        </div>
      </div>

      <div className="cd-tabs" role="tablist" aria-label="أقسام النادي">
        {[
          { id: "posts",   label: "المنشورات" },
          { id: "events",  label: "الفعاليات" },
          { id: "socials", label: "حسابات النادي" },
          { id: "about",   label: "نبذة" }
        ].map(t => (
          <button key={t.id} type="button" role="tab"
                  aria-selected={tab === t.id}
                  className={`cd-tab ${tab === t.id ? "active" : ""}`}
                  onClick={() => setTab(t.id)}>{t.label}</button>
        ))}
      </div>

      <div className="main-body">
        {tab === "posts" && (
          clubPosts.length === 0 ? (
            <div className="empty">
              <Icon name="compass" size={36} stroke={1.2}/>
              <div className="title">لا منشورات بعد</div>
              <div className="sub">سيُضيف النادي منشوراته وإعلاناته هنا قريباً</div>
            </div>
          ) : clubPosts.map(p => (
            <PostCard key={p.id} post={p} club={clubMap[p.clubId]}/>
          ))
        )}

        {tab === "events" && (
          clubEvents.length === 0 ? (
            <div className="empty">
              <Icon name="calendar" size={36} stroke={1.2}/>
              <div className="title">لا فعاليات قادمة</div>
              <div className="sub">تابع النادي لمعرفة فعالياته القادمة</div>
            </div>
          ) : (
            <div className="event-grid">
              {clubEvents.map(e => <EventCard key={e.id} ev={e} club={club} interactive={false}/>)}
            </div>
          )
        )}

        {tab === "socials" && (
          <div className="panel">
            <h3 className="panel-title">حسابات النادي</h3>
            <p className="panel-sub">تابع {club.name} على حساباته الرسمية في منصات التواصل.</p>
            {hasSocials ? (
              <SocialLinks socials={club.socials}/>
            ) : (
              <div className="empty" style={{ padding: 30 }}>
                <div className="title">لا توجد حسابات مسجّلة بعد</div>
              </div>
            )}
          </div>
        )}

        {tab === "about" && (
          <div className="panel">
            <h3 className="panel-title">عن {club.name}</h3>
            <p className="panel-text">
              {club.desc} يجتمع أعضاء النادي بشكل دوري داخل الحرم الجامعي لتنظيم الفعاليات والورش وإصدار الإعلانات الرسمية بعد اعتمادها من إدارة الأنشطة الطلابية بالجامعة.
            </p>
            <h4 className="panel-subtitle">شروط العضوية</h4>
            <ul className="panel-list">
              <li>· أن يكون منتسبًا لجامعة الإمام محمد بن سعود.</li>
              <li>· الالتزام بسياسة الأنشطة الطلابية المعتمدة.</li>
              <li>· المشاركة الفعّالة في فعاليتين على الأقل في الفصل.</li>
            </ul>
            <h4 className="panel-subtitle">كيف تنضم؟</h4>
            <div className="panel-text" style={{ fontSize: 14 }}>
              تواصل مع إدارة الأنشطة الطلابية في مبنى ١٢، أو راسل النادي مباشرة عبر حساباته الرسمية في تبويب «حسابات النادي».
            </div>
          </div>
        )}
      </div>
    </>
  );
}

function EventCard({ ev, club, onOpenClub, interactive = true }) {
  const spots = Number(ev.spots) || 0;
  const taken = Math.min(spots, Math.max(0, Number(ev.taken) || 0));
  const pct   = spots > 0 ? Math.round((taken / spots) * 100) : 0;
  const full  = spots > 0 && taken >= spots;
  const handleOpenClub = () => {
    if (!interactive) return;
    if (onOpenClub && club) onOpenClub(club.id);
  };

  const { d: dayLabel, m: monthLabel } = React.useMemo(() => {
    if (!ev.date || typeof ev.date !== "string") return { d: "", m: "" };
    const parts = ev.date.split("-");
    if (parts.length < 3) return { d: "", m: "" };
    const monthNames = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
    const day = arabicDigits(parts[2]);
    const monthIdx = parseInt(parts[1], 10) - 1;
    const month = monthNames[monthIdx] || arabicDigits(parts[1]);
    return { d: day, m: month };
  }, [ev.date]);

  const displayDate = ev.date ? arabicDigits(ev.date.split("-").reverse().join("/")) : "";
  const displayTime = ev.time ? arabicDigits((ev.time || "").slice(0, 5)) : "";

  return (
    <div className={`event-card ${interactive ? "is-interactive" : ""}`}
         role={interactive ? "group" : undefined}
         aria-label={`فعالية ${ev.title}${club ? " · " + club.name : ""}`}>
      <div className="event-card-head"
           onClick={handleOpenClub}
           style={interactive ? { cursor: "pointer" } : undefined}>
        <div className="event-card-date" aria-hidden="true">
          <div className="d">{dayLabel}</div>
          <div className="m">{monthLabel}</div>
        </div>
        <div className="event-card-headtext">
          <div className="event-card-title">{ev.title}</div>
          {club && (
            <div className="event-card-club">
              <span className="event-card-club-dot" style={{ background: club.color }} aria-hidden="true"></span>
              {club.name}
            </div>
          )}
        </div>
      </div>
      <div className="event-card-row"><span className="ico"><Icon name="calendar" size={14}/></span>{displayDate}</div>
      <div className="event-card-row"><span className="ico"><Icon name="clock"    size={14}/></span>{displayTime}</div>
      <div className="event-card-row"><span className="ico"><Icon name="pin"      size={14}/></span>{ev.location}</div>

      <div className="event-card-cap">
        <div className="event-card-cap-row">
          <span className="event-card-cap-label">
            <Icon name="users" size={13}/>
            <span>{arabicDigits(taken)} / {arabicDigits(spots)} مقعد</span>
          </span>
          <span className={`event-card-cap-pct ${full ? "full" : ""}`}>
            {full ? "مكتمل" : `${arabicDigits(pct)}%`}
          </span>
        </div>
        <div className="event-card-progress" aria-hidden="true">
          <div style={{ width: `${pct}%` }} className={full ? "full" : ""}></div>
        </div>
      </div>

      {ev.registrationUrl && !full && (
        <a className="btn btn-primary event-card-register"
           href={ev.registrationUrl} target="_blank"
           rel="noopener noreferrer nofollow"
           onClick={(e) => e.stopPropagation()}>
          <Icon name="external" size={14}/>
          <span>سجِّل في الفعالية</span>
        </a>
      )}
      {!ev.registrationUrl && !full && (
        <div className="event-card-open-attendance">
          <Icon name="users" size={13}/>
          <span>الحضور مفتوح · للتسجيل تواصل مع النادي عبر حساباته</span>
        </div>
      )}
    </div>
  );
}

function EventsScreen({ state, dispatch }) {
  const { clubs, events } = React.useContext(window.RiwaqData);
  const clubMap = React.useMemo(
    () => Object.fromEntries(clubs.map(c => [c.id, c])),
    [clubs]
  );
  return (
    <>
      <MainHead title="الفعاليات" sub={`${arabicDigits(events.length)} فعالية قادمة من أندية الجامعة`}/>
      <div className="main-body">
        {events.length === 0 ? (
          <div className="empty">
            <Icon name="calendar" size={42} stroke={1.2}/>
            <div className="title">لا فعاليات قادمة</div>
            <div className="sub">ستظهر هنا أحدث فعاليات الأندية فور الإعلان عنها</div>
          </div>
        ) : (
          <div className="event-grid">
            {events.map(e => (
              <EventCard key={e.id} ev={e} club={clubMap[e.clubId]}
                         onOpenClub={(id) => dispatch({ type: "openClub", id })}/>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

Object.assign(window, {
  FeedScreen, ClubsScreen, ClubDetail, EventsScreen, EventCard
});
</script>

<script type="text/babel" data-presets="react">
const RiwaqData = React.createContext({
  clubs: [], posts: [], events: [],
  trendingTags: [],
  loading: true, error: null,
  demo: false, demoReason: null,
  reload: () => {},
});

const initialState = { route: "feed", clubDetailId: null, feedTag: null };

function reducer(state, action) {
  switch (action.type) {
    case "openClub":      return { ...state, route: "clubDetail", clubDetailId: action.id };
    case "backFromClub":  return { ...state, route: "clubs", clubDetailId: null };
    case "setRoute":      return { ...state, route: action.route, clubDetailId: null, feedTag: null };
    case "setFeedTag":    return { ...state, route: "feed", clubDetailId: null, feedTag: action.tag };
    case "clearFeedTag":  return { ...state, feedTag: null };
    default: return state;
  }
}

const DEFAULT_TRENDING = ["#هاكاثون", "#رواق", "#فعاليات", "#مناظرات", "#ريادة"];

function DemoBanner({ reason }) {
  const [hidden, setHidden] = React.useState(() => {
    try { return sessionStorage.getItem("riwaq.demo.banner.dismissed") === "1"; }
    catch (e) { return false; }
  });
  if (hidden) return null;

  const explain = (() => {
    switch (reason) {
      case "configuration_missing":
      case "not_json":
      case "network":
      case "database_unavailable":
        return "المنصة تعرض حالياً بيانات نموذجية — البيانات الحقيقية ستظهر عند تشغيل المنصة رسمياً.";
      default:
        return "أنت تشاهد بيانات نموذجية توضيحية. ستُحدَّث تلقائياً عند إطلاق المنصة رسمياً.";
    }
  })();

  const dismiss = () => {
    try { sessionStorage.setItem("riwaq.demo.banner.dismissed", "1"); } catch (e) {}
    setHidden(true);
  };

  return (
    <div className="demo-banner" role="status">
      <span className="demo-banner-icon" aria-hidden="true">●</span>
      <div className="demo-banner-text">
        <strong>وضع تجريبي</strong>
        <span>· {explain}</span>
      </div>
      <button type="button" className="demo-banner-dismiss"
              onClick={dismiss} aria-label="إخفاء التنبيه" title="إخفاء">✕</button>
    </div>
  );
}

function App() {
  const [state, dispatch] = React.useReducer(reducer, initialState);
  const [data, setData] = React.useState({
    clubs: [], posts: [], events: [],
    trendingTags: DEFAULT_TRENDING,
    loading: true, error: null,
    demo: false, demoReason: null,
  });

  const loadAll = React.useCallback(async () => {
    setData(d => ({ ...d, loading: true, error: null }));
    try {
      const [clubs, posts, events] = await Promise.all([
        window.RiwaqAPI.clubs.list(),
        window.RiwaqAPI.posts.list(),
        window.RiwaqAPI.events.list(),
      ]);
      const tagCount = {};
      posts.forEach(p => (p.tags || []).forEach(t => {
        tagCount[t] = (tagCount[t] || 0) + 1;
      }));
      const trending = Object.entries(tagCount)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 6)
        .map(([t]) => t);
      setData({
        clubs, posts, events,
        trendingTags: trending.length > 0 ? trending : DEFAULT_TRENDING,
        loading: false, error: null,
        demo: !!window.RiwaqAPI.isDemo,
        demoReason: window.RiwaqAPI.demoReason || null,
      });
    } catch (e) {
      setData(d => ({
        ...d, loading: false,
        error: e && e.message ? e.message : "تعذّر تحميل البيانات.",
      }));
    }
  }, []);

  React.useEffect(() => { loadAll(); }, [loadAll]);

  React.useEffect(() => {
    if (data.demo) return;
    const id = setInterval(() => {
      if (!document.hidden) loadAll();
    }, 60000);
    return () => clearInterval(id);
  }, [loadAll, data.demo]);

  const ctx = React.useMemo(() => ({ ...data, reload: loadAll }), [data, loadAll]);
  const hideRail = state.route === "clubDetail";

  if (data.loading && data.clubs.length === 0) {
    return (
      <div className="app-loading">
        <div className="brand-mark brand-mark-large" aria-hidden="true">ر</div>
        <div className="app-loading-title">رواق</div>
        <div className="app-loading-sub">جاري تحميل البيانات…</div>
        <div className="spinner" aria-label="جاري التحميل"></div>
      </div>
    );
  }

  if (data.error && data.clubs.length === 0) {
    return (
      <div className="app-loading">
        <div className="brand-mark brand-mark-large" aria-hidden="true">ر</div>
        <div className="app-loading-title">تعذّر تحميل البيانات</div>
        <div className="app-loading-sub" style={{ maxWidth: 420 }}>{data.error}</div>
        <button type="button" className="btn btn-primary" onClick={loadAll} style={{ marginTop: 16 }}>
          إعادة المحاولة
        </button>
      </div>
    );
  }

  return (
    <RiwaqData.Provider value={ctx}>
      {data.demo && <DemoBanner reason={data.demoReason}/>}
      <div className={`app ${hideRail ? "no-right" : ""} ${data.demo ? "has-demo-banner" : ""}`}>
        <Sidebar
          route={state.route === "clubDetail" ? "clubs" : state.route}
          setRoute={r => dispatch({ type: "setRoute", route: r })}
        />
        <main className="main">
          {state.route === "feed" && <FeedScreen state={state} dispatch={dispatch}/>}
          {state.route === "clubs" && <ClubsScreen state={state} dispatch={dispatch}/>}
          {state.route === "clubDetail" && (
            <ClubDetail
              clubId={state.clubDetailId}
              state={state} dispatch={dispatch}
              onBack={() => dispatch({ type: "backFromClub" })}
            />
          )}
          {state.route === "events" && <EventsScreen state={state} dispatch={dispatch}/>}
        </main>
        {!hideRail && (
          <FeedRail
            onOpenClub={(id) => id ? dispatch({ type: "openClub", id }) : dispatch({ type: "setRoute", route: "clubs" })}
            onOpenEvents={() => dispatch({ type: "setRoute", route: "events" })}
            onSelectTag={(tag) => dispatch({ type: "setFeedTag", tag })}
          />
        )}
      </div>
    </RiwaqData.Provider>
  );
}

window.RiwaqData = RiwaqData;

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
